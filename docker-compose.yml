services:
  episodex:
    build: .
    container_name: episodex
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Container paths
      MEDIA_PATH: /plex/TV Show
      DB_PATH: /app/data/episodex.db
      BACKUP_PATH: /app/data/backups
    volumes:
      - ./data:/app/data
      - plex_nfs:/plex
    labels:
      - "reproxy.server=episodex.loc"
      - "reproxy.route=/"
      - "reproxy.dest=/"
      - "reproxy.port=8080"
      - "reproxy.enabled=true"
    networks:
      - gateway
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  plex_nfs:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.0.1.200,nfsvers=4,rw,soft,timeo=50
      device: ":/mnt/zpool/Plex"

networks:
  gateway:
    name: gateway_gateway
    external: true
