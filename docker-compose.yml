services:
  episodex:
    build: .
    container_name: episodex
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Container paths
      MEDIA_PATH: /media
      DB_PATH: /app/data/episodex.db
      BACKUP_PATH: /app/data/backups
    volumes:
      - ./data:/app/data
      - ${MEDIA_PATH_HOST}:/media
    labels:
      - "reproxy.server=episodex.loc"
      - "reproxy.route=/"
      - "reproxy.dest=/"
      - "reproxy.port=8080"
      - "reproxy.enabled=true"
    networks:
      - gateway
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  gateway:
    name: gateway_gateway
    external: true
