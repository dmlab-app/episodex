run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Go static analysis
    - unused        # Check for unused constants, variables, functions
    - gofmt         # Check code formatting
    - goimports     # Check import formatting
    - misspell      # Spell checker
    - gocritic      # Comprehensive Go linter
    - revive        # Fast, configurable, extensible, flexible
    - unconvert     # Remove unnecessary type conversions
    - unparam       # Find unused function parameters
    - bodyclose     # Check HTTP response body is closed
    - prealloc      # Find slice declarations that could be preallocated
    - gosec         # Security checker
    - exportloopref # Check for pointers to loop variables
    - nolintlint    # Ill-formed or insufficient nolint directives

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - shadow

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/episodex/episodex

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - commentedOutCode
      - whyNoLint

  revive:
    rules:
      - name: exported
        disabled: false
      - name: package-comments
        disabled: true

  staticcheck:
    checks: ["all"]

  gosec:
    excludes:
      - G104  # Audit errors not checked (covered by errcheck)

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - errcheck
        - gosec

    # Ignore long lines for comments
    - linters:
        - lll
      source: "^//"

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
