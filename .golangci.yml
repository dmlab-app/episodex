version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - revive
    - unconvert
    - unparam
    - bodyclose
    - prealloc
    - gosec
    - nolintlint

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false

    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - commentedOutCode
        - whyNoLint

    revive:
      rules:
        - name: exported
          disabled: false
        - name: package-comments
          disabled: true
        - name: var-naming
          disabled: true

    staticcheck:
      checks: ["all"]

    gosec:
      excludes:
        - G104
        - G301
        - G304
        - G306

  exclusions:
    generated: lax
    warn-unused: true
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/episodex/episodex

output:
  show-stats: true
  sort-order:
    - linter
    - file
